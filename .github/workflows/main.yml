name: Deployment

concurrency:
  group: deploy-production
  cancel-in-progress: true

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2  # Нужно для проверки изменений

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps and build frontend
        run: |
          npm ci
          npm run build

      - name: "Заполнение переменных среды"
        run: |
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_ALERT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" >> .env
          echo "TELEGRAM_PROXY=${{ secrets.TELEGRAM_PROXY }}" >> .env
          echo "API_DOMAIN=https://abxtest.com/" >> .env
          echo "ENVIRONMENT=Production" >> .env

      - name: Check what changed
        id: changes
        run: |
          # Проверяем, есть ли предыдущий коммит
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            # Первый коммит - считаем, что всё изменилось
            CHANGED_FILES=$(git diff --name-only --diff-filter=A HEAD)
          fi
          
          if echo "$CHANGED_FILES" | grep -qE "(docker/php/Dockerfile|docker/php/)"; then
            echo "php_dockerfile_changed=true" >> $GITHUB_OUTPUT
          else
            echo "php_dockerfile_changed=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -qE "(composer\.json|composer\.lock)"; then
            echo "composer_changed=true" >> $GITHUB_OUTPUT
          else
            echo "composer_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install rsync client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rsync sshpass

      - name: Ensure rsync exists on remote server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            if command -v rsync >/dev/null 2>&1; then
              echo "rsync already installed on remote"
              exit 0
            fi

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            if command -v apt-get >/dev/null 2>&1; then
              $SUDO apt-get update -y
              $SUDO apt-get install -y rsync
            elif command -v yum >/dev/null 2>&1; then
              $SUDO yum install -y rsync
            elif command -v dnf >/dev/null 2>&1; then
              $SUDO dnf install -y rsync
            elif command -v apk >/dev/null 2>&1; then
              $SUDO apk add --no-cache rsync
            else
              echo "Cannot install rsync automatically on remote host"
              exit 1
            fi

      - name: Rsync only required files (fast, incremental)
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PORT: ${{ secrets.PORT }}
        run: |
          RSYNC_EXCLUDES=(
            "--exclude=.git/"
            "--exclude=node_modules/"
            "--exclude=.github/"
            "--exclude=frontend/"
            "--exclude=vendor/"
            "--exclude=*.mp3"
            "--exclude=*.wav"
            "--exclude=*.flac"
            "--exclude=*.ogg"
            "--exclude=*.aac"
            "--exclude=*.m4a"
            "--exclude=*.opus"
            "--exclude=*.aiff"
            "--exclude=*.aif"
            "--exclude=*.alac"
            "--exclude=*.ape"
            "--exclude=package*.json"
            "--exclude=webpack.config.js"
            "--exclude=Makefile"
            "--exclude=README.md"
          )
          sshpass -p "$PASSWORD" rsync -az --delete -e "ssh -o StrictHostKeyChecking=no -p $PORT" \
            "${RSYNC_EXCLUDES[@]}" \
            ./docker-compose.yml ./docker ./backend ./dist ./.env \
            "$USERNAME@$HOST:/var/www/abxtest.com/"

      - name: Smart deploy (build/composer only if needed)
        uses: appleboy/ssh-action@master
        env:
          PHP_DOCKERFILE_CHANGED: ${{ steps.changes.outputs.php_dockerfile_changed }}
          COMPOSER_CHANGED: ${{ steps.changes.outputs.composer_changed }}
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            export COMPOSE_DOCKER_CLI_BUILD=1
            export DOCKER_BUILDKIT=1
            cd /var/www/abxtest.com
            
            # Пересобираем PHP образ только если изменился Dockerfile
            if [ "$PHP_DOCKERFILE_CHANGED" = "true" ]; then
              echo "🔨 Пересобираем PHP образ (изменился Dockerfile)..."
              docker compose build abx-php
            else
              echo "⏭️  PHP образ не изменился, пропускаем сборку"
            fi
            
            # Поднимаем сервисы (docker compose сам решит, нужно ли пересоздавать)
            docker compose up -d abx-nginx abx-php
            
            # Composer install если изменились зависимости
            # или если отсутствует autoload после синхронизации
            if [ "$COMPOSER_CHANGED" = "true" ] || [ ! -f ./backend/vendor/autoload.php ]; then
              echo "📦 Обновляем зависимости Composer..."
              docker compose exec -T abx-php bash -c "composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader"
            else
              echo "⏭️  Зависимости не изменились, пропускаем composer install"
            fi
            
            docker compose ps

      - name: Smoke test
        uses: wei/curl@v1
        with:
          args: https://abxtest.com/

      - name: Get commit message
        if: ${{ github.event_name == 'push' }}
        id: commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send telegram message on push
        if: ${{ github.event_name == 'push' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ github.actor }} создал commit:
            Commit: ${{ steps.commit.outputs.message }}

            Репозиторий: ${{ github.repository }}

            Изменения: https://github.com/${{ github.repository }}/commit/${{github.sha}}